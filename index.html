<!DOCTYPE html>
<html>
<head>
  <title>ROBUX GIVEAWAY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      background: radial-gradient(circle at top,#001f2b,#000);
    }

    .container {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:15px;
    }

    h1 {
      color:#00f7ff;
    }

    .box {
      width:100%;
      max-width:380px;
      background:linear-gradient(145deg,#001a24,#000);
      padding:20px;
      border-radius:18px;
      margin-top:15px;
      border:1px solid rgba(0,255,255,0.2);
    }

    input, select {
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:12px;
      font-size:15px;
      background:#002733;
      color:#fff;
      box-sizing:border-box;
    }

    button {
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#00bcd4;
      color:white;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
    }

    /* AVATAR */
    #avatarBox {
      text-align:center;
      margin-bottom:10px;
      display:none;
    }

    #avatar {
      width:90px;
      border-radius:50%;
      margin-bottom:5px;
    }

    .offer {
      background:#001a24;
      border-radius:14px;
      padding:15px;
      margin:12px 0;
      text-align:center;
      border:1px solid rgba(255,255,255,0.08);
      box-shadow:none;
      transition:0.2s;
    }

    .offer:hover {
      transform:translateY(-3px);
    }

    .progress-wrap {
      background:#002733;
      border-radius:10px;
      margin-top:10px;
      overflow:hidden;
    }

    #bar {
      width:0%;
      background:#00bcd4;
      padding:6px 0;
      text-align:right;
      font-size:12px;
      color:black;
      font-weight:bold;
    }

    #timer {
      color:#ff4d4d;
      font-weight:bold;
      text-align:center;
      margin-top:10px;
    }

    #livePopup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #001a24;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Bloxy Bucks Giveaway</h1>

  <div class="box">

    <!-- AVATAR DISPLAY -->
    <div id="avatarBox">
      <img id="avatar">
      <div id="displayName"></div>
    </div>

    <input id="username" placeholder="Enter Roblox Username">

    <select id="amount">
      <option value="80">80 Robux</option>
      <option value="140">140 Robux</option>
      <option value="380">380 Robux</option>
      <option value="560">560 Robux</option>
    </select>

    <button onclick="startGen()">Get Robux</button>

    <div id="status"></div>

    <div class="progress-wrap">
      <div id="bar">0%</div>
    </div>

    <div id="timer"></div>

  </div>

  <div id="offers" style="width:100%;max-width:600px;"></div>

</div>

<div id="livePopup"></div>

<script>

// remove spaces
username.oninput = () => username.value = username.value.replace(/\s/g,'');

// FETCH AVATAR
async function fetchAvatar(username){
  try{
    const res = await fetch("https://users.roblox.com/v1/usernames/users",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({usernames:[username]})
    });

    const data = await res.json();
    if(!data.data || !data.data[0]) return null;

    const userId = data.data[0].id;

    const thumb = await fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${userId}&size=150x150&format=Png`);
    const thumbData = await thumb.json();

    return thumbData.data[0].imageUrl;

  }catch{
    return null;
  }
}

// generator
async function startGen(){
  let user = username.value;
  if(!user) return alert("Enter username");

  let status = document.getElementById("status");
  let bar = document.getElementById("bar");

  status.innerText = "Verifying username...";

  // AVATAR LOAD
  let avatarUrl = await fetchAvatar(user);

  if(avatarUrl){
    avatar.src = avatarUrl;
    avatarBox.style.display = "block";
    displayName.innerText = user;
  }

  let progress = 0;

  let interval = setInterval(()=>{
    progress += Math.random()*18;

    if(progress > 100) progress = 100;

    bar.style.width = progress + "%";
    bar.innerText = Math.floor(progress) + "%";

    if(progress >= 100){
      clearInterval(interval);
      status.innerText = "Complete a task below to verify";
      startTimer();
      loadOffers();
    }
  },700);
}

// timer
function startTimer(){
  let time = 600;
  let el = timer;

  let t = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time % 60;
    el.innerText = `Offer expires in ${m}:${s<10?"0"+s:s}`;
    time--;

    if(time < 0){
      clearInterval(t);
      el.innerText = "Session expired";
    }
  },1000);
}

// OFFERS
async function loadOffers(){
  const container = document.getElementById("offers");
  container.innerHTML = "Loading offers...";

  try{
    const res = await fetch('/api/offers');
    const data = await res.json();

    let html = "";

    data.offers.forEach(o=>{
      html += `
        <div class="offer">
          <img src="${o.picture}" style="width:80px;border-radius:10px;"><br>
          <h3>${o.name_short}</h3>
          <a href="${o.link}" target="_blank">
            <button>Complete Offer</button>
          </a>
        </div>
      `;
    });

    container.innerHTML = html;

  }catch{
    container.innerHTML = "Failed to load offers.";
  }
}

// POPUPS (realistic timing)
const fakeUsers = [
"ShadowX","NoobMaster","ProGamer99","DarkKnight","PixelNinja",
"SkyBlade","FireStorm","GhostX","AlphaWolf","ToxicPlayer",
"SpeedRunPro","SniperX","DragonSlayer","IceHunter","ThunderX",
"NightRider","BlazeYT","VenomX","UltraInstinct","ZeroTwo",
"CyberKnight","StormBreaker","LunarX","FrostByte","MegaNoob",
"HyperX","SilentKill","IronManX","FlashSpeed","DeadShot"
];

const robuxAmounts = [80,140,380,560];

function showLivePopup(){
  const popup = document.getElementById("livePopup");

  const user = fakeUsers[Math.random()*fakeUsers.length|0];
  const amount = robuxAmounts[Math.random()*robuxAmounts.length|0];

  popup.innerText = `${user} just received ${amount} Robux`;
  popup.style.display = "block";

  setTimeout(()=> popup.style.display="none", 2500);
}

// random interval (3–6 sec)
setInterval(showLivePopup, 3000 + Math.random()*3000);

</script>

</body>
</html>
