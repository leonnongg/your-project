<!DOCTYPE html>
<html>
<head>
  <title>ROBUX GIVEAWAY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      background: radial-gradient(circle at top,#001f2b,#000);
    }

    .container {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:15px;
    }

    h1 {
      color:#00f7ff;
      text-shadow:0 0 10px #00f7ff, 0 0 20px #ff00cc;
    }

    .box {
      width:100%;
      max-width:380px;
      background:linear-gradient(145deg,#001a24,#000);
      padding:20px;
      border-radius:18px;
      box-shadow:0 0 30px rgba(0,255,255,0.3);
      margin-top:15px;
      border:1px solid rgba(0,255,255,0.3);
    }

    input, select {
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:12px;
      font-size:15px;
      background:#002733;
      color:#fff;
    }

    button {
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(90deg,#00f7ff,#ff00cc);
      color:white;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 0 20px rgba(0,255,255,0.5);
      transition:0.25s;
    }

    button:hover {
      transform:scale(1.05);
    }

    .offer {
      background:linear-gradient(145deg,#001a24,#000);
      border-radius:14px;
      padding:15px;
      margin:12px 0;
      text-align:center;
      border:1px solid rgba(0,255,255,0.3);
    }

    .pulse {
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0% { box-shadow:0 0 10px #00f7ff; }
      50% { box-shadow:0 0 25px #ff00cc; }
      100% { box-shadow:0 0 10px #00f7ff; }
    }

    .progress-wrap {
      background:#002733;
      border-radius:10px;
      margin-top:10px;
      overflow:hidden;
    }

    #bar {
      width:0%;
      background:linear-gradient(90deg,#00f7ff,#ff00cc);
      padding:6px 0;
      text-align:right;
      font-size:12px;
      color:black;
      font-weight:bold;
      transition: width 0.5s;
    }

    #balance {
      font-size:18px;
      margin-top:10px;
      color:#00ffcc;
      text-align:center;
    }

    #timer {
      color:#ff4d4d;
      font-weight:bold;
      margin-top:10px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Bloxy Bucks Giveaway</h1>

  <p>Live users: <span id="liveCount">442</span></p>

  <div class="box">

    <input id="username" placeholder="Enter Username">

    <select id="amount">
      <option value="80">80 Robux</option>
      <option value="140">140 Robux</option>
      <option value="380">380 Robux</option>
      <option value="560">560 Robux</option>
    </select>

    <button onclick="startGen()">Get Robux</button>

    <div id="balance">Balance: 0 Robux</div>

    <div id="status"></div>

    <div class="progress-wrap">
      <div id="bar">0%</div>
    </div>

    <div id="timer"></div>

  </div>

  <div id="offers" style="width:100%;max-width:600px;"></div>

</div>

<script>

// username cleanup
document.getElementById("username").addEventListener("input", e => {
  e.target.value = e.target.value.replace(/\s/g, "");
});

// live counter
setInterval(()=>{
  let el = document.getElementById("liveCount");
  el.innerText = parseInt(el.innerText) + Math.floor(Math.random()*3);
},3000);

// generator
function startGen(){
  let user = document.getElementById("username").value;
  let amount = parseInt(document.getElementById("amount").value);

  if(!user) return alert("Enter username");

  let bar = document.getElementById("bar");
  let status = document.getElementById("status");
  let balance = document.getElementById("balance");

  let progress = 0;
  let fakeBalance = 0;

  let interval = setInterval(()=>{
    progress += 25;
    fakeBalance += amount / 4;

    bar.style.width = progress + "%";
    bar.innerText = progress + "%";

    balance.innerText = "Balance: " + Math.floor(fakeBalance) + " Robux";

    if(progress >= 100){
      clearInterval(interval);
      status.innerText = "Complete a task below to verify";
      startTimer();
      loadOffers();
    }
  },800);
}

// countdown timer
function startTimer(){
  let time = 120;
  let el = document.getElementById("timer");

  let t = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time % 60;
    el.innerText = `Offer expires in ${m}:${s < 10 ? "0"+s : s}`;
    time--;

    if(time < 0){
      clearInterval(t);
      el.innerText = "Session expired, refresh!";
    }
  },1000);
}

// OFFERS (SAFE)
async function loadOffers() {
  const container = document.getElementById("offers");
  container.innerHTML = "Loading offers...";

  try {
    const res = await fetch('/api/offers');
    if (!res.ok) throw new Error();

    const data = await res.json();

    if (!data.offers || data.offers.length === 0) {
      container.innerHTML = "No offers available.";
      return;
    }

    let html = "";

    data.offers.forEach((o,i) => {
      const name = o.name_short || o.name || "Offer";
      const img = o.picture || "https://via.placeholder.com/80";
      const link = o.link || "#";

      html += `
        <div class="offer ${i === 0 ? 'pulse' : ''}">
          <img src="${img}" style="width:80px;border-radius:10px;"><br>
          <h3>${name}</h3>
          <a href="${link}" target="_blank">
            <button>Complete Offer</button>
          </a>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch {
    container.innerHTML = "Failed to load offers.";
  }
}

</script>

</body>
</html>
