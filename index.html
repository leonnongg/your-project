<!DOCTYPE html>
<html>
<head>
  <title>Robux Rewards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f2f4f5;
  color:#1f2937;
}

/* NAVBAR */
.navbar {
  height:60px;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  border-bottom:1px solid #e5e7eb;
}

.logo {
  font-weight:bold;
  font-size:18px;
}

.search {
  background:#f3f4f6;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  width:200px;
}

/* CONTAINER */
.container {
  max-width:500px;
  margin:30px auto;
  padding:15px;
}

/* CARD */
.card {
  background:#fff;
  border-radius:12px;
  padding:20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* TITLE */
h1 {
  text-align:center;
  margin-bottom:5px;
}

.disclaimer {
  text-align:center;
  font-size:12px;
  color:#ef4444;
  margin-bottom:15px;
}

/* INPUTS */
input, select {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  font-size:14px;
}

/* BUTTON */
button {
  width:100%;
  padding:12px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#1d4ed8;
}

/* STATUS */
#status {
  text-align:center;
  margin-top:10px;
  font-size:14px;
  color:#6b7280;
}

/* PROGRESS */
.progress-wrap {
  background:#e5e7eb;
  border-radius:8px;
  margin-top:10px;
  overflow:hidden;
}

#bar {
  width:0%;
  background:#2563eb;
  color:white;
  text-align:right;
  padding:5px;
  font-size:12px;
  transition:0.6s;
}

/* OFFERS */
.offer {
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  border:1px solid #e5e7eb;
}

.offer img {
  width:50px;
  border-radius:8px;
}

.offer h3 {
  font-size:14px;
  margin:0;
}

/* POPUP */
#popup {
  position:fixed;
  bottom:15px;
  left:15px;
  background:#111;
  color:#fff;
  padding:10px 14px;
  border-radius:10px;
  font-size:13px;
  display:none;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">Robux Rewards</div>
  <input class="search" placeholder="Search">
</div>

<div class="container">

  <h1>Get Free Robux</h1>
  <div class="disclaimer">THIS IS NOT ASSOCIATED WITH ROBLOX</div>

  <!-- GENERATOR CARD -->
  <div class="card">

    <input id="username" placeholder="Enter Username (no spaces)">

    <select id="amount">
      <option>80 Robux</option>
      <option>140 Robux</option>
      <option>380 Robux</option>
      <option>560 Robux</option>
    </select>

    <button onclick="startGen()">Continue</button>

    <div id="status"></div>

    <div class="progress-wrap">
      <div id="bar">0%</div>
    </div>

  </div>

  <!-- OFFERS -->
  <div id="offers"></div>

</div>

<!-- POPUP -->
<div id="popup"></div>

<script>

// REMOVE SPACES
document.getElementById("username").addEventListener("input", function() {
  this.value = this.value.replace(/\s/g, "");
});

// POPUP DATA
const names = ["ShadowXGamer","NoobMasterYT","DarkKnightOP","ProBuilder99","EpicRBLXPlayer","SpeedRunX","XxFireLegendxX","GhostPlayz","UltraNoob123","RBLXKing"];

// POPUP
function showPopup(){
  let p = document.getElementById("popup");
  let name = names[Math.floor(Math.random()*names.length)];
  let amt = [80,140,380][Math.floor(Math.random()*3)];

  p.innerText = `${name} just earned ${amt} Robux`;
  p.style.display = "block";

  setTimeout(()=>{p.style.display="none";},3000);
}
setInterval(showPopup,5000);

// GENERATOR
function startGen(){
  let user = document.getElementById("username").value;

  if(!user){
    alert("Enter username");
    return;
  }

  let status = document.getElementById("status");
  let bar = document.getElementById("bar");

  let steps = [
    "Connecting...",
    "Checking username...",
    "Preparing rewards...",
    "Finalizing..."
  ];

  let i = 0;
  let progress = 0;

  let interval = setInterval(()=>{
    status.innerText = steps[i] || "Done";
    progress += 25;

    bar.style.width = progress + "%";
    bar.innerText = progress + "%";

    i++;

    if(progress >= 100){
      clearInterval(interval);
      status.innerHTML = "Complete a task below to receive your reward";
      loadOffers();
    }
  },1000);
}

// OFFERS
async function loadOffers() {
  const res = await fetch('/api/offers');
  const data = await res.json();

  if (!data.offers || data.offers.length === 0) {
    document.getElementById("offers").innerHTML = "No offers available";
    return;
  }

  let html = "";

  data.offers.forEach(o => {
    html += `
      <div class="offer">
        <div style="display:flex;align-items:center;gap:10px;">
          <img src="${o.picture}">
          <h3>${o.name_short}</h3>
        </div>
        <a href="${o.link}">
          <button style="width:auto;padding:8px 12px;">Go</button>
        </a>
      </div>
    `;
  });

  document.getElementById("offers").innerHTML = html;
}

</script>

</body>
</html>
