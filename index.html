<!DOCTYPE html>
<html>
<head>
  <title>ROBUX GIVEAWAY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      color:white;
      background: radial-gradient(circle at top,#001f2b,#000);
    }

    .container {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:15px;
    }

    h1 {
      color:#00f7ff;
    }

    .box {
      width:100%;
      max-width:380px;
      background:linear-gradient(145deg,#001a24,#000);
      padding:20px;
      border-radius:18px;
      margin-top:15px;
      border:1px solid rgba(0,255,255,0.3);
    }

    /* FIXED INPUT SIZE */
    input, select {
      width:100%;
      padding:14px;
      border:none;
      border-radius:10px;
      margin-bottom:12px;
      font-size:15px;
      background:#002733;
      color:#fff;
      box-sizing:border-box;
    }

    button {
      width:100%;
      padding:14px;
      border:none;
      border-radius:12px;
      background:linear-gradient(90deg,#00f7ff,#ff00cc);
      color:white;
      font-weight:bold;
      font-size:16px;
      cursor:pointer;
    }

    .offer {
      background:#001a24;
      border-radius:14px;
      padding:15px;
      margin:12px 0;
      text-align:center;
      border:1px solid rgba(0,255,255,0.2);
      /* ❌ removed glow */
      box-shadow:none;
      transition:0.2s;
    }

    .offer:hover {
      transform:translateY(-3px);
    }

    .progress-wrap {
      background:#002733;
      border-radius:10px;
      margin-top:10px;
      overflow:hidden;
    }

    #bar {
      width:0%;
      background:linear-gradient(90deg,#00f7ff,#ff00cc);
      padding:6px 0;
      text-align:right;
      font-size:12px;
      color:black;
      font-weight:bold;
    }

    #avatar {
      display:none;
      margin:10px auto;
      width:80px;
      border-radius:10px;
    }

    #timer {
      color:#ff4d4d;
      font-weight:bold;
      text-align:center;
      margin-top:10px;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>Bloxy Bucks Giveaway</h1>

  <div class="box">

    <input id="username" placeholder="Enter Roblox Username">

    <select id="amount">
      <option value="80">80 Robux</option>
      <option value="140">140 Robux</option>
      <option value="380">380 Robux</option>
      <option value="560">560 Robux</option>
    </select>

    <button onclick="startGen()">Get Robux</button>

    <!-- avatar -->
    <img id="avatar">

    <div id="status"></div>

    <div class="progress-wrap">
      <div id="bar">0%</div>
    </div>

    <div id="timer"></div>

  </div>

  <div id="offers" style="width:100%;max-width:600px;"></div>

</div>

<script>

// remove spaces
document.getElementById("username").addEventListener("input", function() {
  this.value = this.value.replace(/\s/g, "");
});

// 🔥 ROBLOX AVATAR FETCH
async function fetchAvatar(username) {
  try {
    const res1 = await fetch("https://users.roblox.com/v1/usernames/users", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        usernames:[username],
        excludeBannedUsers:true
      })
    });

    const data1 = await res1.json();
    if (!data1.data || data1.data.length === 0) return null;

    const id = data1.data[0].id;

    const res2 = await fetch(
      `https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=${id}&size=150x150&format=Png`
    );

    const data2 = await res2.json();
    return data2.data[0].imageUrl;

  } catch {
    return null;
  }
}

// generator
function startGen(){
  let user = document.getElementById("username").value;
  let amount = parseInt(document.getElementById("amount").value);

  if(!user) return alert("Enter username");

  let bar = document.getElementById("bar");
  let status = document.getElementById("status");
  let avatar = document.getElementById("avatar");

  status.innerText = "Verifying username...";

  // fetch avatar FIRST
  fetchAvatar(user).then(url => {
    if(url){
      avatar.src = url;
      avatar.style.display = "block";
    }
  });

  let progress = 0;

  let interval = setInterval(()=>{
    progress += 25;

    bar.style.width = progress + "%";
    bar.innerText = progress + "%";

    if(progress >= 100){
      clearInterval(interval);
      status.innerText = "Complete a task below to verify";
      startTimer();
      loadOffers();
    }
  },800);
}

// timer
function startTimer(){
  let time = 120;
  let el = document.getElementById("timer");

  let t = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time % 60;
    el.innerText = `Offer expires in ${m}:${s < 10 ? "0"+s : s}`;
    time--;

    if(time < 0){
      clearInterval(t);
      el.innerText = "Session expired";
    }
  },1000);
}

// OFFERS (unchanged logic)
async function loadOffers() {
  const container = document.getElementById("offers");
  container.innerHTML = "Loading offers...";

  try {
    const res = await fetch('/api/offers');
    const data = await res.json();

    if (!data.offers || data.offers.length === 0) {
      container.innerHTML = "No offers available.";
      return;
    }

    let html = "";

    data.offers.forEach(o => {
      html += `
        <div class="offer">
          <img src="${o.picture}" style="width:80px;border-radius:10px;"><br>
          <h3>${o.name_short}</h3>
          <a href="${o.link}" target="_blank">
            <button>Complete Offer</button>
          </a>
        </div>
      `;
    });

    container.innerHTML = html;

  } catch {
    container.innerHTML = "Failed to load offers.";
  }
}

</script>

</body>
</html>
