<!DOCTYPE html>
<html>
<head>
  <title>Top CPI Offers</title>
</head>
<body style="background:linear-gradient(135deg,#0d0d0d,#1a1a1a);color:white;text-align:center;font-family:sans-serif;margin:0;overflow-x:hidden;">

<!-- Header -->
<div style="background:linear-gradient(90deg,#ff1a1a,#00cc66);padding:25px;box-shadow:0 0 20px rgba(255,0,0,0.6);">
  <h1 style="margin:0;font-size:28px;">🎄 Free Robux Christmas Event 🎁</h1>
</div>

<h2 style="margin-top:20px;color:#00ffcc;">Limited Time Holiday Rewards</h2>

<!-- Fake counter -->
<p style="color:#ff4d4d;font-weight:bold;">🔥 <span id="liveCount">1287</span> users completing offers now</p>

<div id="offers" style="max-width:600px;margin:auto;">Loading...</div>

<script>
// fake live counter (visual only)
setInterval(() => {
  let el = document.getElementById("liveCount");
  el.innerText = parseInt(el.innerText) + Math.floor(Math.random()*3);
}, 3000);

async function loadOffers() {
  const res = await fetch('/api/offers');
  const data = await res.json();

  if (!data.offers || data.offers.length === 0) {
    document.getElementById("offers").innerHTML = "No offers available";
    return;
  }

  let html = "";

  data.offers.forEach(o => {
    html += `
      <div style="
        background:linear-gradient(145deg,#1a1a1a,#262626);
        border-radius:18px;
        padding:20px;
        margin:20px;
        box-shadow:0 0 20px rgba(0,255,150,0.3), 0 0 20px rgba(255,0,0,0.3);
        transition:0.3s;
      " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
        
        <img src="${o.picture}" width="100" style="border-radius:12px;"><br>
        
        <h3 style="margin:10px 0;color:#ffffff;">${o.name_short}</h3>

        <!-- fake progress bar -->
        <div style="background:#333;border-radius:10px;overflow:hidden;margin:10px 0;">
          <div style="width:${Math.floor(Math.random()*40+60)}%;background:#00ff99;padding:5px 0;"></div>
        </div>
        <small style="color:#ccc;">Almost full – act fast!</small><br><br>

        <a href="${o.link}">
          <button style="
            background:linear-gradient(90deg,#ff1a1a,#00cc66);
            color:white;
            border:none;
            padding:12px 25px;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            box-shadow:0 0 10px rgba(255,0,0,0.5);
          ">
            🎁 Install Now
          </button>
        </a>

      </div>
    `;
  });

  document.getElementById("offers").innerHTML = html;
}

loadOffers();
</script>

</body>
</html>
