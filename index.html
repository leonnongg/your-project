<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roblox Script Hub</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(180deg, #f5fbff, #ffffff);
      color: #172033;
    }

    header {
      padding: 35px 18px;
      text-align: center;
      background: #eaf7ff;
      border-bottom: 1px solid #d9efff;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
      color: #0f5f8f;
    }

    header p {
      margin-top: 10px;
      color: #526172;
      font-size: 15px;
    }

    .container {
      max-width: 1050px;
      margin: 30px auto;
      padding: 0 18px;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 18px;
    }

    .game-card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      cursor: pointer;
      transition: 0.25s;
      border: 1px solid #eef5fb;
    }

    .game-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    .game-card img {
      width: 100%;
      height: 135px;
      object-fit: cover;
      background: #dff4ff;
    }

    .game-card div {
      padding: 16px;
    }

    .game-card h3 {
      margin: 0;
      color: #12324a;
    }

    .game-card p {
      font-size: 13px;
      color: #6a7580;
    }

    button, .offer-btn {
      border: none;
      background: #27a8ff;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-top: 10px;
    }

    button:hover, .offer-btn:hover {
      background: #168fdc;
    }

    .hidden {
      display: none;
    }

    .panel {
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      border: 1px solid #eef5fb;
    }

    .back {
      background: #eef6fb;
      color: #234;
      margin-bottom: 18px;
    }

    .script-box {
      background: #f3f8fc;
      border: 1px solid #dcebf5;
      padding: 15px;
      border-radius: 14px;
      white-space: pre-wrap;
      color: #142535;
      margin-top: 14px;
    }

    .offers {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .offer {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      background: #f7fbff;
      border: 1px solid #e4f1fb;
    }

    .offer img {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      object-fit: cover;
    }

    .small {
      color: #6b7680;
      font-size: 13px;
    }
  </style>
</head>

<body>

<header>
  <h1>Roblox Script Hub</h1>
  <p>Select a game, complete a sponsor task, and unlock the script.</p>
</header>

<div class="container">

  <section id="home">
    <div class="games" id="games"></div>
  </section>

  <section id="gamePage" class="hidden">
    <button class="back" onclick="goHome()">← Back</button>

    <div class="panel">
      <h2 id="gameTitle"></h2>
      <p class="small">Complete one sponsor task below to unlock this script.</p>

      <button onclick="showOffers()">Unlock Script</button>

      <div id="offersArea" class="hidden">
        <h3>Available Sponsor Tasks</h3>
        <div id="offers" class="offers">Loading offers...</div>

        <button onclick="unlockScript()">I completed the task</button>
      </div>

      <div id="scriptArea" class="hidden">
        <h3>Your Script</h3>
        <div class="script-box" id="scriptBox"></div>
        <button onclick="copyScript()">Copy Script</button>
      </div>
    </div>
  </section>

</div>

<script>
const games = [
  {
    name: "Blox Fruits",
    image: "https://games.gg/news/blox-fruits-roblox-codes-for-free-xp-boosts/",
    script: `-- Add your allowed Blox Fruits script here`
  },
  {
    name: "Steal a Brainrot",
    image: "https://www.bluestacks.com/blog/redeem-codes/steal-a-brainrot-redeem-codes-en.html",
    script: `-- Add your allowed Steal a Brainrot script here`
  },
  {
    name: "PLS DONATE",
    image: "https://www.roblox.com/games/8737602449/PLS-DONATE",
    script: `-- Add your allowed PLS DONATE script here`
  },
  {
    name: "Brookhaven RP",
    image: "https://duniagames.co.id/discover/article/daftar-id-roblox-brookhaven-terbaru/en",
    script: `-- Add your allowed Brookhaven RP script here`
  },
  {
    name: "Adopt Me",
    image: "https://www.sportskeeda.com/roblox-news/adopt-me-birthday-magic-update-patch-notes",
    script: `-- Add your allowed Adopt Me script here`
  }
];

let selectedGame = null;

function renderGames() {
  const box = document.getElementById("games");
  box.innerHTML = "";

  games.forEach((game, index) => {
    box.innerHTML += `
      <div class="game-card" onclick="openGame(${index})">
        <img src="${game.image}" onerror="this.src='https://placehold.co/600x350?text=Roblox+Game'">
        <div>
          <h3>${game.name}</h3>
          <p>Click to view and unlock the script.</p>
        </div>
      </div>
    `;
  });
}

function openGame(index) {
  selectedGame = games[index];
  document.getElementById("home").classList.add("hidden");
  document.getElementById("gamePage").classList.remove("hidden");
  document.getElementById("gameTitle").innerText = selectedGame.name + " Script";
  document.getElementById("offersArea").classList.add("hidden");
  document.getElementById("scriptArea").classList.add("hidden");
}

function goHome() {
  document.getElementById("gamePage").classList.add("hidden");
  document.getElementById("home").classList.remove("hidden");
}

async function showOffers() {
  document.getElementById("offersArea").classList.remove("hidden");
  await loadOffers();
}

async function loadOffers() {
  try {
    const res = await fetch('/api/offers');
    const data = await res.json();

    if (!data.offers || data.offers.length === 0) {
      document.getElementById("offers").innerText = "No offers available right now.";
      return;
    }

    let html = "";

    data.offers.forEach(o => {
      html += `
        <div class="offer">
          <img src="${o.picture}" onerror="this.src='https://placehold.co/100x100?text=Offer'">
          <div>
            <b>${o.name_short}</b><br>
            <a class="offer-btn" href="${o.link}" target="_blank">Complete Task</a>
          </div>
        </div>
      `;
    });

    document.getElementById("offers").innerHTML = html;

  } catch (e) {
    document.getElementById("offers").innerText = "Error loading offers.";
  }
}

function unlockScript() {
  document.getElementById("scriptArea").classList.remove("hidden");
  document.getElementById("scriptBox").innerText = selectedGame.script;
}

function copyScript() {
  navigator.clipboard.writeText(selectedGame.script);
  alert("Script copied!");
}

renderGames();
</script>

</body>
</html>
