<!DOCTYPE html>
<html>

<head>

  <title>Top CPA Offers</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      background:#0f172a;
      color:white;
      font-family:Arial;
      padding:20px;
      margin:0;
    }

    h1{
      text-align:center;
      margin-bottom:30px;
    }

    .offer{
      background:#1e293b;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
    }

    .offer h2{
      margin-top:0;
    }

    .btn{
      display:inline-block;
      margin-top:15px;
      padding:10px 15px;
      background:#2563eb;
      color:white;
      text-decoration:none;
      border-radius:8px;
    }

  </style>

</head>

<body>

  <h1>Highest Paying CPA Offers</h1>

  <div id="offers"></div>

  <script>

    async function loadOffers(){

      try{

        const res = await fetch('/api/offers');

        const offers = await res.json();

        const container =
          document.getElementById('offers');

        offers.forEach(offer => {

          const div =
            document.createElement('div');

          div.className = 'offer';

          div.innerHTML = `
            <h2>${offer.anchor || 'Offer'}</h2>

            <p>
              Reward:
              ${offer.conversion || 'N/A'}
            </p>

            <a
              class="btn"
              href="${offer.url}"
              target="_blank"
            >
              Complete Offer
            </a>
          `;

          container.appendChild(div);

        });

      }catch(err){

        console.log(err);

      }

    }

    loadOffers();

  </script>

</body>

</html>
